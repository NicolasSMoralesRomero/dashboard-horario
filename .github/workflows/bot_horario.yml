name: WFM Slack Bot
on:
  schedule:
    - cron: '55 * * * *' 
  workflow_dispatch: 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
steps:
      - name: Checkout del código
        uses: actions/checkout@v4  # <-- Cambiado de v3 a v4

      - name: Configurar Python
        uses: actions/setup-python@v5  # <-- Cambiado de v4 a v5
        with:
          python-version: '3.11'

      - name: Instalar librerías
        run: |
          pip install pandas gspread google-auth requests pytz

      - name: Ejecutar Bot de WFM
        env:
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          SHEET_URL: ${{ secrets.SHEET_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python bot.py
